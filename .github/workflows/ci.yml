name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint, format, and type check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint + import order)
        run: ruff check src tests

      - name: Black (format check)
        run: black --check src tests

      - name: Mypy (type check)
        run: mypy src

  test-and-run-workflow:
    name: Test project on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v

      - name: Run full ML workflow
        run: |
          coffee-build-db --train data/locations_train.csv --candidates data/locations_candidates.csv
          coffee-train
          coffee-score

      - name: Verify expected outputs
        run: |
          test -f outputs/metrics.json
          test -f outputs/model.joblib
          test -f outputs/model_comparison.csv
          test -f outputs/model_metadata.json
          test -f outputs/feature_importance.csv
          test -f outputs/predictions_test.csv
          test -f outputs/predictions_all.csv
          test -f outputs/scored_candidates.csv
          test -f outputs/charts/actual_vs_predicted.png
          test -f outputs/charts/feature_importance.png
          test -f outputs/charts/residuals_hist.png
          test -f outputs/charts/model_comparison_mae.png

      - name: Upload workflow outputs
        uses: actions/upload-artifact@v4
        with:
          name: coffee-shop-profit-predictor-outputs-python-${{ matrix.python-version }}
          path: outputs/
