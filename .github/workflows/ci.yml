name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-run-workflow:
    name: Test project on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v

      - name: Run full ML workflow
        run: |
          python src/create_db.py --train data/locations_train.csv --candidates data/locations_candidates.csv
          python src/train_regression.py
          python src/score_new_sites.py

      - name: Verify expected outputs
        run: |
          test -f outputs/metrics.json
          test -f outputs/model.joblib
          test -f outputs/scored_candidates.csv
          test -f outputs/model_comparison.csv
          test -f outputs/actual_vs_predicted.png
          test -f outputs/feature_importance.png
          test -f outputs/residuals_hist.png
          test -f outputs/model_comparison.png

      - name: Upload workflow outputs
        uses: actions/upload-artifact@v4
        with:
          name: coffee-shop-profit-predictor-outputs-python-${{ matrix.python-version }}
          path: outputs/
